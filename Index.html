<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparador de Portafolios</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(900px, 90%);
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      color: #bbb;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    a {
      display: block;
      padding: 1.5rem;
      border: 1px solid #333;
      border-radius: 16px;
      color: white;
      text-decoration: none;
      background: #1b1b1b;
      transition: 0.2s;
    }

    a:hover {
      transform: translateY(-4px);
      background: #252525;
      border-color: #777;
    }

    span {
      display: block;
      margin-top: 0.5rem;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Portafolios de Diseño</h1>
    <p>Elige una versión para revisar la landing generada por cada IA.</p>

    <section class="grid">
      <a href="./gpt-55/">
        GPT 5.5
        <span>Versión generada por GPT</span>
      </a>

      <a href="./gemini-3-pro/">
        Gemini 3 Pro
        <span>Versión generada por Gemini</span>
      </a>

      <a href="./perplexity/">
        Perplexity
        <span>Versión generada por Perplexity</span>
      </a>

      <a href="./claude-sonnet-46/">
        Claude Sonnet 4.6
        <span>Versión generada por Claude</span>
      </a>
    </section>
  </main>
</body>
</html>
